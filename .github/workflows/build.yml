name: Build Rumble

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build-plugin:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake -B build -G Xcode -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin target
        shell: pwsh
        run: |
          cmake --build build --config Release --target Rumble_All
          if ($LASTEXITCODE -ne 0) {
            cmake --build build --config Release --target BoutiqueRumble_All
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Output -Force | Out-Null
          iscc installer_win.iss

      - name: Package macOS bundles
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp -R build/BoutiqueRumble_artefacts/Release/VST3/*.vst3 dist/
          cp -R build/BoutiqueRumble_artefacts/Release/AU/*.component dist/
          cd dist
          zip -r ../rumble-macos.zip ./*.vst3 ./*.component

      - name: Package Windows bundles
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "Output/Rumble_Setup.exe" -DestinationPath "rumble-windows.zip" -Force

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumble-macos
          path: rumble-macos.zip
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumble-windows
          path: rumble-windows.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rumble-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip

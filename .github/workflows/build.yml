name: Build Rumble

on:
  push:
    branches:
      - main
      - master

jobs:
  build-plugin:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake -B build -G Xcode -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin target
        shell: pwsh
        run: |
          cmake --build build --config Release --target Rumble_All
          if ($LASTEXITCODE -ne 0) {
            cmake --build build --config Release --target BoutiqueRumble_All
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumble-macos
          path: |
            build/BoutiqueRumble_artefacts/Release/VST3/*.vst3
            build/BoutiqueRumble_artefacts/Release/AU/*.component

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumble-windows
          path: build/BoutiqueRumble_artefacts/Release/VST3/*.vst3
